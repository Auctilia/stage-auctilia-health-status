# Change these first
owner: pavelpetrcz # Your GitHub organization or username, where this repository lives
repo: stage-auctilia-health-status # The name of this repository

sites:
  - name: Stage Auctilia Health
    method: GET 
    url: $SECRET_SITE
    headers:
    - "Authorization: Bearer $HT_TOKEN"
    - "Content-Type: application/json"

status-website:
  # Add your custom domain name, or remove the `cname` line if you don't have a domain
  # Uncomment the `baseUrl` line if you don't have a custom domain and add your repo name there
  cname: stage.auctilia.cz
  # baseUrl: /your-repo-name
  logoUrl: https://raw.githubusercontent.com/upptime/upptime.js.org/master/static/img/icon.svg
  name: Stage Auctilia
  introTitle: "**Auctilia** je aukční systém pro transparentní dražby."
  navbar:
    - title: Status
      href: /

# Upptime also supports notifications, assigning issues, and more
